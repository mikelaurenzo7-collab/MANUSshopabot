name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  manus-sync-smoke-test:
    # Mirrors what Manus runs when the operator clicks "Sync GitHub
    # changes". If this job fails, the merge will most likely fail to sync
    # to the live backend. Keep this job lean — install + preflight +
    # check + build only — so the signal is "would Manus accept this
    # merge?" without being polluted by unrelated test flakes.
    name: Manus sync smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Preflight (Manus sync guard)
        # TODO: switch to `pnpm preflight --strict` once the 7 historical
        # drizzle snapshots (0020-0024, 0026, 0027) are regenerated.
        # The --strict mode is wired through preflight-sync.mjs and ready
        # to flip; it just needs the missing snapshots committed first.
        run: pnpm preflight

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build

  ci:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Tests
        run: pnpm test
