    <style>
      /* Pre-hydration splash — prevents FOUC and shows brand mark instantly */
      html, body { background: #050507; color: #e2e8f0; margin: 0; }
      body { font-family: "Inter", ui-sans-serif, system-ui, sans-serif; }
      #initial-splash {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(14, 165, 233, 0.08), transparent 60%), #050507;
        z-index: 9999;
      }
      #initial-splash[data-hidden="true"] { opacity: 0; pointer-events: none; transition: opacity 0.4s ease-out; }
      .splash-mark {
        width: 56px; height: 56px; border-radius: 16px;
        background: linear-gradient(135deg, #0EA5E9 0%, #06B6D4 100%);
        box-shadow: 0 0 0 1px rgba(14, 165, 233, 0.4), 0 12px 36px rgba(14, 165, 233, 0.35);
        position: relative;
        animation: splash-pulse 1.4s ease-in-out infinite;
      }
      .splash-mark::after {
        content: ""; position: absolute; inset: -8px; border-radius: 22px;
        background: radial-gradient(circle, rgba(14, 165, 233, 0.4), transparent 70%);
        filter: blur(10px); opacity: 0.6;
      }
      @keyframes splash-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
      @media (prefers-reduced-motion: reduce) { .splash-mark { animation: none; } }
      noscript .nojs {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        padding: 2rem; text-align: center; background: #050507; color: #e2e8f0; z-index: 99999;
      }
      noscript .nojs h1 { font-size: 1.5rem; margin: 0 0 0.5rem; font-weight: 800; }
      noscript .nojs p { color: rgba(255,255,255,0.6); max-width: 28rem; line-height: 1.6; }
    </style>
  </head>

  <body>
    <div id="initial-splash" aria-hidden="true">
      <div class="splash-mark" role="img" aria-label="Shop_a_Bot loading"></div>
    </div>
    <noscript>
      <div class="nojs">
        <div>
          <h1>JavaScript required</h1>
          <p>Shop_a_Bot is an interactive e-commerce orchestration platform. Please enable JavaScript in your browser to continue.</p>
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide the splash once the app mounts (root has children).
      (function () {
        var splash = document.getElementById("initial-splash");
        var root = document.getElementById("root");
        if (!splash || !root) return;
        var hide = function () {
          splash.setAttribute("data-hidden", "true");
          setTimeout(function () { splash.remove(); }, 500);
        };
        var observer = new MutationObserver(function () {
          if (root.childElementCount > 0) { observer.disconnect(); hide(); }
        });
        observer.observe(root, { childList: true });
        // Safety fallback — never let the splash linger past 8s.
        setTimeout(function () { observer.disconnect(); hide(); }, 8000);
      })();
    </script>
  </body>
